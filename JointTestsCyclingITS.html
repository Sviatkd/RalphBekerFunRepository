<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>body{background-color:white;}</style>
</head>
<body>
<div id="wald_test_hac_summary" style="padding-left:0px;padding-right:0px;padding-top:10px;padding-bottom:10px;overflow-x:auto;overflow-y:auto;width:auto;height:auto;">
  <style>
    #wald_test_hac_summary table {
      font-family: system-ui, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji';
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    #wald_test_hac_summary thead, #wald_test_hac_summary tbody, #wald_test_hac_summary tfoot, #wald_test_hac_summary tr, #wald_test_hac_summary td, #wald_test_hac_summary th {
      border-style: none;
    }
    #wald_test_hac_summary .gt_table {
      display: table;
      border-collapse: collapse;
      line-height: normal;
      margin-left: auto;
      margin-right: auto;
      color: #333333;
      font-size: 16px;
      font-weight: normal;
      font-style: normal;
      background-color: #FFFFFF;
      width: auto;
      border-top: 2px solid #A8A8A8;
      border-bottom: 2px solid #A8A8A8;
    }
    #wald_test_hac_summary .gt_heading {
      background-color: #FFFFFF;
      text-align: center;
      border-bottom-color: #FFFFFF;
      border-left-style: none;
      border-right-style: none;
    }
    #wald_test_hac_summary .gt_title {
      color: #333333;
      font-size: 125%;
      font-weight: initial;
      padding-top: 4px;
      padding-bottom: 4px;
      padding-left: 5px;
      padding-right: 5px;
      border-bottom-color: #FFFFFF;
      border-bottom-width: 0;
    }
    #wald_test_hac_summary .gt_col_headings {
      border-top: 2px solid #D3D3D3;
      border-bottom: 2px solid #D3D3D3;
    }
    #wald_test_hac_summary .gt_col_heading {
      color: #333333;
      background-color: #FFFFFF;
      font-size: 100%;
      font-weight: normal;
      text-align: left;
      padding: 5px 5px 6px 5px;
      vertical-align: bottom;
    }
    #wald_test_hac_summary .gt_row {
      padding: 8px 5px;
      border-top: 1px solid #D3D3D3;
      vertical-align: middle;
    }
    #wald_test_hac_summary .gt_left { text-align: left; }
    #wald_test_hac_summary .gt_right { text-align: right; font-variant-numeric: tabular-nums; }
  </style>

  <table class="gt_table">
    <thead class="gt_header">
      <tr>
        <th colspan="4" class="gt_heading gt_title gt_font_normal">Joint Hypothesis Tests (HAC)</th>
      </tr>
    </thead>
    <thead>
      <tr class="gt_col_headings">
        <th class="gt_col_heading gt_left">Test</th>
        <th class="gt_col_heading gt_right">Statistic</th>
        <th class="gt_col_heading gt_right">df</th>
        <th class="gt_col_heading gt_right">p_val</th>
      </tr>
    </thead>
    <tbody class="gt_table_body">
      <tr>
        <td class="gt_row gt_left">Joint ulez + slope (no covid controls)</td>
        <td class="gt_row gt_right">12.076</td>
        <td class="gt_row gt_right">2</td>
        <td class="gt_row gt_right">2.000000e-04</td>
      </tr>
      <tr>
        <td class="gt_row gt_left">Joint ulez + slope (covid controls)</td>
        <td class="gt_row gt_right">21.377</td>
        <td class="gt_row gt_right">2</td>
        <td class="gt_row gt_right">3.868000e-06</td>
      </tr>
    </tbody>
  </table>
</div>
</body>
</html>
